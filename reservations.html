<!DOCTYPE html>
<html>
<head>
  <title>Freak Cafe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    /* ... Reusing same Body and Navbar CSS as above ... */
    body { background-color: #EFE9E3; background-image: radial-gradient(#d1c7bc 0.5px, transparent 0.5px); background-size: 30px 30px; margin: 0; font-family: 'Glacier', 'Trebuchet MS', sans-serif; color: #333; }
    .navbar { background: rgba(239, 233, 227, 0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
    .nav-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 1100px; }
    .navbar a { display: flex; flex-direction: column; align-items: center; color: #5D4037; text-decoration: none; padding: 8px 14px; border-radius: 12px; font-weight: 600; font-size: 12px; min-width: 75px; transition: 0.3s; }
    .navbar a i { font-size: 18px; margin-bottom: 4px; color: #A68A64; }
    .navbar a:hover { background-color: #E4DCD3; transform: translateY(-2px); }
    .navbar a.active { background-color: #C9B59C; color: white; }
    .navbar a.active i { color: white; }

    /* Reservation Layout */
    .reservation-card {
      background: white;
      max-width: 850px;
      margin: 50px auto;
      border-radius: 20px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .res-section { padding: 40px; width: 50%; }
    .table-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .table-option { background: #F8F5F2; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; border: 2px solid transparent; transition: 0.2s; font-weight: bold; }
    .table-option.active { background: #C9B59C; color: white; }
    
    form { display: flex; flex-direction: column; gap: 12px; }
    input { padding: 12px; border-radius: 8px; border: 1px solid #E4DCD3; background: #F8F5F2; }
    button { background: #4B2E2A; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

    .footer { background-color: #4B2E2A; color: #EFE9E3; padding: 40px 20px; text-align: center; display: flex; justify-content: space-around; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="Homepage.html"><i class="fa-solid fa-house"></i>Home</a>
      <a href="drinks.html"><i class="fa-solid fa-mug-hot"></i>Drinks</a>
      <a href="foods.html"><i class="fa-solid fa-utensils"></i>Foods</a>
      <a href="Promo.html"><i class="fa-solid fa-tags"></i>Promos</a>
      <a href="locations.html"><i class="fa-solid fa-map-location-dot"></i>Locations</a>
      <a href="contact.html"><i class="fa-solid fa-paper-plane"></i>Contact</a>
      <a href="notes.html"><i class="fa-solid fa-pen-nib"></i>Notes</a>
      <a href="reservations.html" class="active"><i class="fa-solid fa-calendar-check"></i>Reservations</a>
    </div>
  </nav>

  <div class="reservation-card">
    <div class="res-section" style="background: #FDFBFA;">
      <h2>Select Space</h2>
      <div class="table-grid">
        <div class="table-option" onclick="this.classList.toggle('active')">Solo</div>
        <div class="table-option" onclick="this.classList.toggle('active')">Duo</div>
        <div class="table-option" onclick="this.classList.toggle('active')">Group (4)</div>
        <div class="table-option" onclick="this.classList.toggle('active')">Meeting (6+)</div>
      </div>
    </div>
    <div class="res-section">
      <h2>Booking Details</h2>
      <form>
        <input type="text" placeholder="Name">
        <input type="date">
        <input type="time">
        <button type="submit">Book Table</button>
      </form>
    </div>
  </div>

  <div class="footer">
    <div><h3>Freak Cafe</h3><p>Makati City, Metro Manila</p></div>
    <div><p>hi@freakcafe.com</p></div>
  </div>

</body>
</html>
