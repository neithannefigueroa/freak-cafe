<!DOCTYPE html>
<html>
<head>
  <title>Freak Cafe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      background-color: #EFE9E3;
      background-image: radial-gradient(#d1c7bc 0.5px, transparent 0.5px);
      background-size: 30px 30px;
      margin: 0;
      padding: 0;
      font-family: 'Glacier', 'Trebuchet MS', sans-serif;
      overflow-x: hidden;
      color: #333;
    }

    /* Standardized 8-Item Aesthetic Navbar */
    .navbar {
      background: rgba(239, 233, 227, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1100px;
    }

    .navbar a {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #5D4037;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
      min-width: 75px;
    }

    .navbar a i {
      font-size: 18px;
      margin-bottom: 4px;
      color: #A68A64;
    }

    .navbar a:hover {
      background-color: #E4DCD3;
      transform: translateY(-2px);
    }

    .navbar a.active {
      background-color: #C9B59C;
      color: white;
    }
    .navbar a.active i { color: white; }


    .contact-wrapper {
      width: 85%;
      max-width: 1000px;
      margin: 60px auto;
      background: white;
      display: flex; 
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }


    .contact-info {
      flex: 1;
      background: #4B2E2A; 
      color: #EFE9E3;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-info h2 { font-size: 2em; margin-bottom: 20px; }
    .contact-info p { opacity: 0.8; line-height: 1.6; margin-bottom: 30px; }

    .info-item {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .info-item span { margin-right: 15px; font-size: 1.2em; }

    /* Right Side: Form */
    .contact-form {
      flex: 1.5;
      padding: 40px;
      background-color: #fff;
    }

    .form-group {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .input-box {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .input-box label {
      font-size: 0.8em;
      color: #888;
      margin-bottom: 5px;
    }

    .input-box input, .input-box textarea {
      border: none;
      border-bottom: 1.5px solid #D9CFC7;
      padding: 10px 0;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-box input:focus, .input-box textarea:focus {
      border-bottom-color: #4B2E2A;
    }

    .send-btn {
      background-color: #C9B59C;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
      transition: background 0.3s;
    }

    .send-btn:hover { background-color: #4B2E2A; }

    /* Footer */

    .footer {
      background-color: #4B2E2A;
      color: #EFE9E3;
      padding: 40px 20px;
      margin-top: 50px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      text-align: center;
    }
  </style>
</head>
<body>
 <nav class="navbar">
    <div class="nav-container">
      <a href="Homepage.html"><i class="fa-solid fa-house"></i>Home</a>
      <a href="drinks.html"><i class="fa-solid fa-mug-hot"></i>Drinks</a>
      <a href="foods.html"><i class="fa-solid fa-utensils"></i>Foods</a>
      <a href="Promo.html"><i class="fa-solid fa-tags"></i>Promos</a>
      <a href="locations.html"><i class="fa-solid fa-map-location-dot"></i>Locations</a>
      <a href="contact.html"><i class="fa-solid fa-paper-plane"></i>Contact</a>
      <a href="notes.html"><i class="fa-solid fa-pen-nib"></i>Notes</a>
      <a href="reservations.html" class="active"><i class="fa-solid fa-calendar-check"></i>Reservations</a>
    </div>
  </nav>

  <div class="contact-wrapper">
    <div class="contact-info">
      <h2>Contact Information</h2>
      <p>Have questions about our sugar-free menu or want to host a meeting? We'd love to hear from you!</p>
      
      <div class="info-item"><span>📞</span> +63 917 123 4567</div>
      <div class="info-item"><span>✉️</span> hi@freakcafe.com</div>
      <div class="info-item"><span>📍</span> 3333 Zapote, Makati City</div>
    </div>

    <div class="contact-form">
      <form>
        <div class="form-group">
          <div class="input-box">
            <label>Your Name</label>
            <input type="text" placeholder="Huan Dela Cruz">
          </div>
          <div class="input-box">
            <label>Your Email</label>
            <input type="email" placeholder="yuan@email.com">
          </div>
        </div>

        <div class="input-box">
          <label>Your Subject</label>
          <input type="text" placeholder="Inquiry about...">
        </div>

        <div class="input-box" style="margin-top: 20px;">
          <label>Message</label>
          <textarea rows="4" placeholder="Write your message here..."></textarea>
        </div>

        <button type="submit" class="send-btn">Send Message</button>
      </form>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left">Freak Cafe</div>
    <div class="footer-center">Privacy Policy</div>
    <div class="footer-right">hi@freakcafe</div>
  </div>
  
  </body>
</html>
